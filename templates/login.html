{extend base}
{cut title}Sign In{/cut}

<div class="auth-box">
    <h2 class="m-0 inline-center">Sign in / Register</h2>
    <form method="POST">
        <div class="mb-2">
            <label for="un" class="block fw-bold mb-1">Username</label>
            <input type="text" id="un" name="username" autocomplete="username" required autofocus class="w-full box-border">
        </div>
        <div class="mb-2">
            <label for="pw" class="block fw-bold mb-1">Password</label>
            <input type="password" id="pw" name="password" autocomplete="current-password" required class="w-full box-border">
        </div>
        <button class="btn bg-primary w-full fw-bold" name="do_auth" value="1">Enter Pocketbook</button>
    </form>
    <p class="empty-note mt-4 text-sm">
        New here? Just pick a username and password. If the account doesn't exist, we'll create it for you automatically.
    </p>
</div>
