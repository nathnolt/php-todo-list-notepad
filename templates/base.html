<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{paste title} - Pocketbook</title>

<style>
/* --- Base Styles --- */
body, button, input, textarea, select {
    font-family: Georgia, serif;
    font-size: 16px;
    line-height: 1.3;
    color: #000;
}
body {
    background: #fff;
    margin: 0;
    padding: 0 0 40px 0;
}
a {
    color: #000;
    text-decoration: underline;
}

/* --- Layout --- */
.wrap {
    width: 840px;
    max-width: 100%;
    margin: 0 auto;
    padding: 8px 4px;
    box-sizing: border-box;
}
.topbar {
    padding-bottom: 4px;
    border-bottom: 2px dashed #e6e6e6;
}
.section-bottom {
    margin-top: 10px;
    border-top: 2px dashed #e6e6e6;
    padding-top: 4px;
}

/* --- Components & Forms --- */
.btn {
    display: inline-block;
    padding: 2px 8px;
    border: none;
    border-radius: 4px;
    color: #000;
    text-decoration: none;
    cursor: pointer;
}
input[type=text],
input[type=password],
input[type=number],
select {
    box-sizing: border-box;
    border: 2px solid #e6e6e6;
    padding: 2px 4px;
    border-radius: 4px;
}
textarea {
    width: 100%;
    background-color: #e6e6e6;
    border: 2px solid #e6e6e6;
    padding: 4px;
    border-radius: 4px;
    font-family: monospace;
    box-sizing: border-box;
}
.app-title {
    font-size: 18px;
    font-weight: bold;
}
.flash {
    padding: 6px 10px;
    margin-bottom: 8px;
    border-radius: 4px;
}
.empty-note {
    font-style: italic;
    color: #555;
}

/* --- Lists & Checklists --- */
ul.item-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
ul.item-list li {
    padding: 4px 8px;
    margin-bottom: 4px;
    border-radius: 4px;
    background: #e6e6e6;
}
ul.item-list li a { font-weight: bold; }
ul.item-list li .meta {
    font-size: 13px;
    margin-left: 8px;
    color: #555;
}
.checklist {
    list-style: none;
    padding: 0;
}
.checklist li { padding: 2px 0; }
.checklist input[type=text].done {
    text-decoration: line-through;
    opacity: 0.5;
}

/* --- Specific Page Elements --- */
.page-divider {
    border: none;
    border-top: 2px dashed #e6e6e6;
    margin: 24px 0;
}
h2.group-name {
    font-size: 18px;
    margin: 0;
}
.auth-box {
    max-width: 400px;
    margin: 15px auto;
    padding: 10px;
    border: 2px dashed #e6e6e6;
    border-radius: 8px;
}
.page-label {
    font-weight: bold;
    display: inline-block;
    margin-top: 6px;
}

/* fills */
.bg-primary { background-color: #b3d1ff; } 
.bg-danger  { background-color: #ffb3b3; } 
.bg-muted   { background-color: #e6e6e6; }

/* box sizing */
.box-border { box-sizing: border-box; }

/* widths */
.w-full { width: 100%; }


/* displays */
.block { display: block; }
.inline { display: inline; }
.inline-block { display: inline-block; }

/* floats */
.float-right { float: right; }
.cl-both { clear: both; }

/* --- Utility: Margins --- */
.m0 { margin: 0; }
.mt0 { margin-top: 0; } 
.mt1 { margin-top: 4px; }
.mt3 { margin-top: 6px; }
.mt5 { margin-top: 12px; }
.mb1 { margin-bottom: 2px; }
.mb2 { margin-bottom: 4px; } 
.mb3 { margin-bottom: 6px; } 
.mb4 { margin-bottom: 8px; }
.mb5 { margin-bottom: 10px; } 
.mb6 { margin-bottom: 12px; }
.mr4 { margin-right: 8px; }

/* --- Utility: Paddings --- */
.p0 { padding: 0; } 
.py1 {
    padding-top: 4px;
    padding-bottom: 4px;
}

/* --- Utility: Typography --- */
.fs-base { font-size: 14px; }
.fw-bold { font-weight: bold; }
.text-center { text-align: center; }
.text-sm { font-size: 12px; }
.text-lg { font-size: 16px; }
.text-xl { font-size: 18px; }

/* --- Utility: Lists --- */
.list-none {
    list-style: none;
    margin: 0;
    padding: 0;
}
</style>
	
</head>
<body>


<div class="wrap">

<header class="topbar mb1">
    <h1 class="app-title m0 inline-block">{paste title} - Pocketbook</h1>
    {if $loggedIn}
        <nav class="inline-block">
                {if $section !== 'dashboard' && $action === ''}
                    <a href="?" class="btn bg-muted">Home</a>
                {end}
                {if $action !== ''}
                    {if $section === 'lists'}<a href="?lists" class="btn bg-muted">Lists</a>{end}
                    {if $section === 'notepads'}<a href="?notepads" class="btn bg-muted">Notebooks</a>{end}
                {end}
        </nav>
    {end}
</header>

{if $flash}
    <div class="flash {{$flash['type'] === 'ok' ? 'bg-primary' : 'bg-danger'}}">{{{$flash['msg']}}}</div>
{end}

{main}
</div>

{raw}
<script>
// Auto-save styling for checklists
document.querySelectorAll('.checklist input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
        cb.nextElementSibling.classList.toggle('done', cb.checked);
    });
});
// Ctrl+S to save any form
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        const btn = document.querySelector('button[type="submit"]');
        if (btn) btn.click();
    }
});
</script>
{/raw}
</body>
</html>
